workflows:
  ios-unsigned-simulator:
    name: Organizza iOS Unsigned
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      cocoapods: default
      vars:
        APP_NAME: "Organizza"
        BUNDLE_ID: "com.heliosalles.organizza"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - ~/Library/Developer/Xcode/DerivedData

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v
          xcodebuild -version
          pod --version

      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Create iOS platform if missing
        script: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build unsigned iOS app for simulator
        script: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log
