workflows:
  organiza_ios_sideloadly:
    name: Organiza iOS Sideloadly IPA
    max_build_duration: 90

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - npm install
      - npm run build
      - npm install @capacitor/ios@7 @capacitor/core@7 @capacitor/cli@7
      - npx cap add ios || true
      - npx cap sync ios
      - |
          cd ios/App
          pod install
      - |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - |
          APP_PATH=$(find ios/App/build/Build/Products/Debug-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          rm -rf Payload Organiza.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          cd Payload
          zip -r ../Organiza.ipa .
          cd ..

    artifacts:
      - Organiza.ipa
      - ios/App/build/Build/Products/Debug-iphoneos/*.app
